                            <div className="w-10 h-10 rounded-xl bg-primary flex items-center justify-center text-primary-foreground shadow-md shadow-primary/30">
                                <Icon name="ScanLine" size={20} />
                            </div>
                            <div>
                                <h1 className="font-bold text-lg leading-tight text-primary">SmartScanner</h1>
                                <p className="text-xs text-muted-foreground font-medium">Kas Foodstocks</p>
                            </div>
                        </div>

                        <nav className="flex-1 px-4 py-6 space-y-2">
                            <NavItem icon="LayoutDashboard" label="Dashboard" active={activeTab === 'dashboard'} onClick={() => setActiveTab('dashboard')} />
                            <NavItem icon="Camera" label="Scan Struk" active={activeTab === 'scan'} onClick={() => setActiveTab('scan')} />
                            <NavItem icon="History" label="Riwayat" active={activeTab === 'history'} onClick={() => setActiveTab('history')} />
                            <NavItem icon="PieChart" label="Laporan" active={activeTab === 'report'} onClick={() => setActiveTab('report')} />
                            <NavItem icon="Settings" label="Pengaturan" active={activeTab === 'settings'} onClick={() => setActiveTab('settings')} />
                        </nav>

                        <div className="p-4 border-t border-border">
                            <button 
                                onClick={() => setDarkMode(!darkMode)}
                                className="flex items-center space-x-3 w-full px-4 py-3 rounded-lg hover:bg-muted transition-colors text-muted-foreground hover:text-foreground"
                            >
                                <Icon name={darkMode ? "Sun" : "Moon"} size={20} />
                                <span className="font-medium">{darkMode ? "Mode Terang" : "Mode Gelap"}</span>
                            </button>
                            <div className="mt-4 flex items-center space-x-3 px-4 py-2">
                                <img 
                                    src="Logo tagline.png" 
                                    onError={(e) => { e.target.onerror = null; e.target.src = "https://ui-avatars.com/api/?name=Food+Stocks&background=f472b6&color=fff"; }}
                                    alt="Foodstocks Logo" 
                                    className="w-12 h-10 object-contain bg-white rounded-md p-1 border border-border" 
                                />
                                <div className="text-sm">
                                    <p className="font-semibold text-foreground">Admin Keuangan</p>
                                    <p className="text-xs text-muted-foreground">Google Synced <Icon name="CheckCircle2" size={10} className="inline text-green-500" /></p>
                                </div>
                            </div>
                        </div>
                    </aside>

                    {/* Main Content Area */}
                    <main className="flex-1 flex flex-col h-full relative overflow-y-auto w-full pb-20 md:pb-0">
                        {/* Mobile Header */}
                        <header className="md:hidden bg-card/80 backdrop-blur-md sticky top-0 z-20 px-4 py-3 flex items-center justify-between border-b border-border">
                            <div className="flex items-center space-x-2">
                                <div className="w-8 h-8 rounded-lg bg-primary flex items-center justify-center text-primary-foreground shadow-sm">
                                    <Icon name="ScanLine" size={16} />
                                </div>
                                <h1 className="font-bold text-md text-primary">Foodstocks Kas</h1>
                            </div>
                            <button onClick={() => setDarkMode(!darkMode)} className="p-2 rounded-full bg-muted text-foreground">
                                <Icon name={darkMode ? "Sun" : "Moon"} size={18} />
                            </button>
                        </header>

                        <div className="flex-1 p-4 md:p-8 max-w-7xl mx-auto w-full">
                            {activeTab === 'dashboard' && <DashboardView transactions={transactions} onSync={handleManualSync} isSyncing={isSyncing} />}
                            {activeTab === 'scan' && <ScannerView onSave={handleSaveTransaction} categories={categories} />}
                            {activeTab === 'history' && <HistoryView transactions={transactions} onDelete={handleDeleteTransaction} categories={categories} />}
                            {activeTab === 'report' && <ReportView transactions={transactions} categories={categories} />}
                            {activeTab === 'settings' && <SettingsView categories={categories} setCategories={setCategories} webhookUrl={webhookUrl} setWebhookUrl={setWebhookUrl} />}
                        </div>
                    </main>

                    {/* Mobile Bottom Navigation */}
                    <nav className="md:hidden bg-card/90 backdrop-blur-md fixed bottom-0 left-0 right-0 border-t border-border z-50 px-6 py-3 flex justify-between items-center pb-safe">
                        <MobileNavItem icon="LayoutDashboard" label="Home" active={activeTab === 'dashboard'} onClick={() => setActiveTab('dashboard')} />
                        <MobileNavItem icon="History" label="Riwayat" active={activeTab === 'history'} onClick={() => setActiveTab('history')} />
                        <div className="relative -top-6">
                            <button 
                                onClick={() => setActiveTab('scan')}
                                className="w-14 h-14 rounded-full bg-primary text-primary-foreground flex items-center justify-center shadow-lg shadow-primary/40 border-4 border-background transform transition-transform active:scale-95"
                            >
                                <Icon name="Scan" size={24} />
                            </button>
                        </div>
                        <MobileNavItem icon="PieChart" label="Laporan" active={activeTab === 'report'} onClick={() => setActiveTab('report')} />
                        <MobileNavItem icon="Settings" label="Setelan" active={activeTab === 'settings'} onClick={() => setActiveTab('settings')} />
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
