<!DOCTYPE html>
<html lang="id" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartScanner Kas Foodstocks</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Mengimpor Template Warna OKLCH (Sistem Shadcn UI) */
        :root {
            --background: 0.9816 0.0017 247.8390;
            --foreground: 0.1649 0.0352 281.8285;
            --card: 1.0000 0 0;
            --card-foreground: 0.1649 0.0352 281.8285;
            --popover: 1.0000 0 0;
            --popover-foreground: 0.1649 0.0352 281.8285;
            --primary: 0.6726 0.2904 341.4084;
            --primary-foreground: 1.0000 0 0;
            --secondary: 0.9595 0.0200 286.0164;
            --secondary-foreground: 0.1649 0.0352 281.8285;
            --muted: 0.9595 0.0200 286.0164;
            --muted-foreground: 0.1649 0.0352 281.8285;
            --accent: 0.8903 0.1739 171.2690;
            --accent-foreground: 0.1649 0.0352 281.8285;
            --destructive: 0.6535 0.2348 34.0370;
            --destructive-foreground: 1.0000 0 0;
            --border: 0.9205 0.0086 225.0878;
            --input: 0.9205 0.0086 225.0878;
            --ring: 0.6726 0.2904 341.4084;
            --radius: 0.5rem;
        }

        .dark {
            --background: 0.1649 0.0352 281.8285;
            --foreground: 0.9513 0.0074 260.7315;
            --card: 0.2542 0.0611 281.1423;
            --card-foreground: 0.9513 0.0074 260.7315;
            --popover: 0.2542 0.0611 281.1423;
            --popover-foreground: 0.9513 0.0074 260.7315;
            --primary: 0.6726 0.2904 341.4084;
            --primary-foreground: 1.0000 0 0;
            --secondary: 0.2542 0.0611 281.1423;
            --secondary-foreground: 0.9513 0.0074 260.7315;
            --muted: 0.2123 0.0522 280.9917;
            --muted-foreground: 0.6245 0.0500 278.1046;
            --accent: 0.8903 0.1739 171.2690;
            --accent-foreground: 0.1649 0.0352 281.8285;
            --destructive: 0.6535 0.2348 34.0370;
            --destructive-foreground: 1.0000 0 0;
            --border: 0.3279 0.0832 280.7890;
            --input: 0.3279 0.0832 280.7890;
            --ring: 0.6726 0.2904 341.4084;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: oklch(var(--border)); border-radius: 4px; }
        
        /* Glassmorphism */
        .glass {
            background: oklch(var(--background) / 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid oklch(var(--border) / 0.5);
        }

        /* Hide number input spinners */
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
    </style>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        border: 'oklch(var(--border) / <alpha-value>)',
                        input: 'oklch(var(--input) / <alpha-value>)',
                        ring: 'oklch(var(--ring) / <alpha-value>)',
                        background: 'oklch(var(--background) / <alpha-value>)',
                        foreground: 'oklch(var(--foreground) / <alpha-value>)',
                        primary: {
                            DEFAULT: 'oklch(var(--primary) / <alpha-value>)',
                            foreground: 'oklch(var(--primary-foreground) / <alpha-value>)',
                        },
                        secondary: {
                            DEFAULT: 'oklch(var(--secondary) / <alpha-value>)',
                            foreground: 'oklch(var(--secondary-foreground) / <alpha-value>)',
                        },
                        destructive: {
                            DEFAULT: 'oklch(var(--destructive) / <alpha-value>)',
                            foreground: 'oklch(var(--destructive-foreground) / <alpha-value>)',
                        },
                        muted: {
                            DEFAULT: 'oklch(var(--muted) / <alpha-value>)',
                            foreground: 'oklch(var(--muted-foreground) / <alpha-value>)',
                        },
                        accent: {
                            DEFAULT: 'oklch(var(--accent) / <alpha-value>)',
                            foreground: 'oklch(var(--accent-foreground) / <alpha-value>)',
                        },
                        popover: {
                            DEFAULT: 'oklch(var(--popover) / <alpha-value>)',
                            foreground: 'oklch(var(--popover-foreground) / <alpha-value>)',
                        },
                        card: {
                            DEFAULT: 'oklch(var(--card) / <alpha-value>)',
                            foreground: 'oklch(var(--card-foreground) / <alpha-value>)',
                        },
                    },
                    borderRadius: {
                        lg: 'var(--radius)',
                        md: 'calc(var(--radius) - 2px)',
                        sm: 'calc(var(--radius) - 4px)',
                    }
                }
            }
        }
    </script>

    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- PDF Export Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
</head>
<body class="bg-background text-foreground transition-colors duration-300">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // --- Mock Data ---
        const initialTransactions = [
            { id: 1, date: '2026-03-01', store: 'Pasar Induk Kramat Jati', total: 1250000, category: 'Bahan Baku', status: 'Synced' },
            { id: 2, date: '2026-03-02', store: 'Toko Plastik Makmur', total: 350000, category: 'Operasional', status: 'Synced' },
            { id: 3, date: '2026-03-03', store: 'SPBU Pertamina', total: 200000, category: 'Operasional', status: 'Pending' },
            { id: 4, date: '2026-03-04', store: 'Gramedia', total: 150000, category: 'ATK', status: 'Synced' },
            { id: 5, date: '2026-03-04', store: 'Facebook Ads', total: 500000, category: 'Marketing', status: 'Synced' },
        ];

        // --- Icons Component ---
        const Icon = ({ name, size = 24, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (iconRef.current) {
                    iconRef.current.innerHTML = '';
                    lucide.createIcons({
                        icons: { [name]: lucide.icons[name] },
                        nameAttr: 'data-lucide',
                        attrs: {
                            class: className,
                            width: size,
                            height: size,
                        }
                    });
                    const svg = document.createElement('i');
                    svg.setAttribute('data-lucide', name);
                    iconRef.current.appendChild(svg);
                    lucide.createIcons({ root: iconRef.current });
                }
            }, [name, size, className]);
            return <span ref={iconRef} className="inline-flex items-center justify-center"></span>;
        };

        // --- Sub Components ---
        const NavItem = ({ icon, label, active, onClick }) => (
            <button 
                onClick={onClick}
                className={`flex items-center space-x-3 w-full px-4 py-3 rounded-lg transition-all duration-200 ${
                    active 
                    ? 'bg-primary text-primary-foreground font-semibold shadow-sm' 
                    : 'text-muted-foreground hover:bg-muted hover:text-foreground'
                }`}
            >
                <Icon name={icon} size={20} className={active ? 'text-primary-foreground' : ''} />
                <span>{label}</span>
            </button>
        );

        const MobileNavItem = ({ icon, label, active, onClick }) => (
            <button onClick={onClick} className={`flex flex-col items-center space-y-1 ${active ? 'text-primary' : 'text-muted-foreground'}`}>
                <Icon name={icon} size={20} />
                <span className="text-[10px] font-medium">{label}</span>
            </button>
        );

        // --- Views ---
        const DashboardView = ({ transactions, onSync, isSyncing }) => {
            const totalPengeluaran = transactions.reduce((sum, tx) => sum + tx.total, 0);
            
            return (
                <div className="space-y-6 animate-fade-in">
                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                        <div>
                            <h2 className="text-2xl font-bold text-foreground">Halo, Tim Keuangan! 👋</h2>
                            <p className="text-muted-foreground">Berikut adalah ringkasan kas Foodstocks bulan ini.</p>
                        </div>
                        <button 
                            onClick={onSync} 
                            disabled={isSyncing}
                            className={`hidden md:flex items-center space-x-2 bg-card border border-border text-card-foreground px-4 py-2 rounded-md text-sm font-medium shadow-sm hover:bg-muted transition ${isSyncing ? 'opacity-50 cursor-not-allowed' : ''}`}
                        >
                            <Icon name="RefreshCw" size={16} className={isSyncing ? "animate-spin" : ""} />
                            <span>{isSyncing ? 'Menyinkronkan...' : 'Sinkronisasi Sheets'}</span>
                        </button>
                    </div>

                    {/* Metrics Cards */}
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4 md:gap-6">
                        <div className="bg-primary rounded-xl p-6 text-primary-foreground shadow-md relative overflow-hidden">
                            <div className="absolute top-0 right-0 -mt-4 -mr-4 w-24 h-24 bg-white opacity-10 rounded-full blur-2xl"></div>
                            <div className="flex items-center justify-between mb-4">
                                <h3 className="font-medium opacity-90">Total Pengeluaran (Bulan Ini)</h3>
                                <div className="p-2 bg-white/20 rounded-lg"><Icon name="TrendingUp" size={20} /></div>
                            </div>
                            <p className="text-3xl font-bold">Rp {totalPengeluaran.toLocaleString('id-ID')}</p>
                            <p className="text-sm opacity-80 mt-2">+12% dari bulan lalu</p>
                        </div>

                        <div className="bg-card rounded-xl p-6 shadow-sm border border-border">
                            <div className="flex items-center justify-between mb-4">
                                <h3 className="font-medium text-muted-foreground">Total Transaksi</h3>
                                <div className="p-2 bg-secondary/20 text-secondary-foreground rounded-lg"><Icon name="Receipt" size={20} /></div>
                            </div>
                            <p className="text-3xl font-bold text-card-foreground">{transactions.length}</p>
                            <p className="text-sm text-muted-foreground mt-2">Struk diproses</p>
                        </div>

                        <div className="bg-card rounded-xl p-6 shadow-sm border border-border">
                            <div className="flex items-center justify-between mb-4">
                                <h3 className="font-medium text-muted-foreground">Kategori Terbesar</h3>
                                <div className="p-2 bg-accent/20 text-accent-foreground rounded-lg"><Icon name="ShoppingBag" size={20} /></div>
                            </div>
                            <p className="text-3xl font-bold text-card-foreground">Bahan Baku</p>
                            <p className="text-sm text-muted-foreground mt-2">52% dari total</p>
                        </div>
                    </div>

                    {/* Recent Transactions */}
                    <div className="bg-card rounded-xl shadow-sm border border-border overflow-hidden">
                        <div className="p-6 border-b border-border flex justify-between items-center">
                            <h3 className="font-bold text-lg text-card-foreground">Transaksi Terakhir</h3>
                            <button className="text-sm text-primary font-medium hover:underline">Lihat Semua</button>
                        </div>
                        <div className="overflow-x-auto">
                            <table className="w-full text-left border-collapse">
                                <thead>
                                    <tr className="bg-muted/50 text-muted-foreground text-sm uppercase tracking-wider">
                                        <th className="p-4 font-medium">Tanggal</th>
                                        <th className="p-4 font-medium">Toko/Supplier</th>
                                        <th className="p-4 font-medium">Kategori</th>
                                        <th className="p-4 font-medium text-right">Total</th>
                                        <th className="p-4 font-medium text-center">Status</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-border">
                                    {transactions.slice(0, 5).map(tx => (
                                        <tr key={tx.id} className="hover:bg-muted/50 transition-colors">
                                            <td className="p-4 text-sm text-muted-foreground">{tx.date}</td>
                                            <td className="p-4 font-medium text-foreground">{tx.store}</td>
                                            <td className="p-4">
                                                <span className="px-2 py-1 text-xs rounded-full bg-secondary text-secondary-foreground">
                                                    {tx.category}
                                                </span>
                                            </td>
                                            <td className="p-4 text-sm font-semibold text-right text-foreground">
                                                Rp {tx.total.toLocaleString('id-ID')}
                                            </td>
                                            <td className="p-4 text-center">
                                                {tx.status === 'Synced' ? (
                                                    <span className="inline-flex items-center space-x-1 text-green-500 text-xs font-medium">
                                                        <Icon name="CheckCircle2" size={14} /> <span>Tersimpan</span>
                                                    </span>
                                                ) : (
                                                    <span className="inline-flex items-center space-x-1 text-yellow-600 dark:text-yellow-400 text-xs font-medium">
                                                        <Icon name="Clock" size={14} /> <span>Pending</span>
                                                    </span>
                                                )}
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        };

        const ResultEditor = ({ initialData, onSave, categories }) => {
            const [data, setData] = useState(initialData);

            useEffect(() => {
                const newSubtotal = data.items.reduce((sum, item) => sum + (Number(item.total) || 0), 0);
                setData(prev => ({ ...prev, subtotal: newSubtotal, total: newSubtotal }));
            }, [data.items]);

            const handleItemChange = (index, field, value) => {
                const newItems = [...data.items];
                newItems[index][field] = value;
                
                if (field === 'qty' || field === 'price') {
                    newItems[index].total = (Number(newItems[index].qty) || 0) * (Number(newItems[index].price) || 0);
                }
                
                setData({ ...data, items: newItems });
            };

            const downloadCSV = () => {
                let csvContent = "data:text/csv;charset=utf-8,";
                csvContent += "Toko,Tanggal,Nama Barang,Qty,Harga Satuan,Total,Kategori,Metode Pembayaran\n";
                
                data.items.forEach(item => {
                    const row = [
                        `"${data.storeName}"`,
                        data.date,
                        `"${item.name}"`,
                        item.qty,
                        item.price,
                        item.total,
                        `"${item.category}"`,
                        `"${data.paymentMethod}"`
                    ].join(",");
                    csvContent += row + "\r\n";
                });

                const encodedUri = encodeURI(csvContent);
                const link = document.createElement("a");
                link.setAttribute("href", encodedUri);
                link.setAttribute("download", `struk_${data.date}_${data.storeName.replace(/\s+/g, '_')}.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            return (
                <div className="bg-card rounded-xl shadow-lg border border-border overflow-hidden flex flex-col h-full animate-fade-in">
                    <div className="p-4 md:p-6 bg-muted/30 border-b border-border">
                        <div className="flex flex-col md:flex-row justify-between gap-4 mb-4">
                            <h3 className="font-bold text-lg text-card-foreground flex items-center gap-2">
                                <Icon name="Edit3" size={20} className="text-primary" /> Verifikasi Data
                            </h3>
                            <div className="flex gap-2">
                                <button onClick={downloadCSV} className="px-3 py-1.5 bg-secondary text-secondary-foreground rounded-md text-sm font-medium flex items-center gap-1 hover:opacity-80 transition">
                                    <Icon name="Download" size={14} /> CSV
                                </button>
                                <button className="px-3 py-1.5 bg-accent text-accent-foreground rounded-md text-sm font-medium flex items-center gap-1 hover:opacity-80 transition">
                                    <Icon name="FileSpreadsheet" size={14} /> Sheets
                                </button>
                            </div>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label className="block text-xs font-medium text-muted-foreground mb-1">Nama Toko</label>
                                <input 
                                    type="text" 
                                    value={data.storeName} 
                                    onChange={e => setData({...data, storeName: e.target.value})}
                                    className="w-full px-3 py-2 bg-background border border-input rounded-md focus:ring-2 focus:ring-ring outline-none transition text-sm text-foreground"
                                />
                            </div>
                            <div>
                                <label className="block text-xs font-medium text-muted-foreground mb-1">Tanggal</label>
                                <input 
                                    type="date" 
                                    value={data.date} 
                                    onChange={e => setData({...data, date: e.target.value})}
                                    className="w-full px-3 py-2 bg-background border border-input rounded-md focus:ring-2 focus:ring-ring outline-none transition text-sm text-foreground"
                                />
                            </div>
                        </div>
                    </div>

                    <div className="flex-1 overflow-x-auto p-4 md:p-6">
                        <table className="w-full min-w-[600px] text-left">
                            <thead>
                                <tr className="text-xs uppercase text-muted-foreground border-b border-border">
                                    <th className="pb-3 font-medium">Item</th>
                                    <th className="pb-3 font-medium w-16">Qty</th>
                                    <th className="pb-3 font-medium w-32">Harga</th>
                                    <th className="pb-3 font-medium w-32">Total</th>
                                    <th className="pb-3 font-medium w-40">Kategori</th>
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-border">
                                {data.items.map((item, idx) => (
                                    <tr key={idx}>
                                        <td className="py-2 pr-2">
                                            <input type="text" value={item.name} onChange={e => handleItemChange(idx, 'name', e.target.value)} className="w-full bg-transparent border-b border-transparent hover:border-input focus:border-ring outline-none py-1 text-sm text-foreground" />
                                        </td>
                                        <td className="py-2 pr-2">
                                            <input type="number" value={item.qty} onChange={e => handleItemChange(idx, 'qty', e.target.value)} className="w-full bg-transparent border-b border-transparent hover:border-input focus:border-ring outline-none py-1 text-sm text-foreground text-center" />
                                        </td>
                                        <td className="py-2 pr-2">
                                            <input type="number" value={item.price} onChange={e => handleItemChange(idx, 'price', e.target.value)} className="w-full bg-transparent border-b border-transparent hover:border-input focus:border-ring outline-none py-1 text-sm text-foreground text-right" />
                                        </td>
                                        <td className="py-2 pr-2">
                                            <input type="number" value={item.total} readOnly className="w-full bg-transparent border-b border-transparent outline-none py-1 text-sm font-medium text-foreground text-right opacity-70 cursor-not-allowed" />
                                        </td>
                                        <td className="py-2">
                                            <select value={item.category} onChange={e => handleItemChange(idx, 'category', e.target.value)} className="w-full bg-background border border-input rounded px-2 py-1 text-xs outline-none focus:ring-1 focus:ring-ring text-foreground">
                                                {categories.map(cat => (
                                                    <option key={cat} value={cat}>{cat}</option>
                                                ))}
                                            </select>
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                        
                        <button 
                            onClick={() => setData({...data, items: [...data.items, {name:'', qty:1, price:0, total:0, category: categories[0] || 'Bahan Baku'}]})}
                            className="mt-4 text-xs font-medium text-primary hover:opacity-80 flex items-center gap-1"
                        >
                            <Icon name="PlusCircle" size={14} /> Tambah Baris
                        </button>
                    </div>

                    <div className="p-4 md:p-6 bg-muted/30 border-t border-border flex flex-col md:flex-row justify-between items-center gap-4">
                        <div className="text-sm">
                            <span className="text-muted-foreground mr-2">Metode Pembayaran:</span>
                            <input 
                                type="text" 
                                value={data.paymentMethod} 
                                onChange={e => setData({...data, paymentMethod: e.target.value})}
                                className="bg-background border border-input rounded px-2 py-1 text-sm w-32 outline-none text-foreground"
                            />
                        </div>
                        <div className="flex items-center gap-6">
                            <div className="text-right">
                                <p className="text-xs text-muted-foreground font-medium">Total Akhir</p>
                                <p className="text-xl font-bold text-foreground">Rp {data.total.toLocaleString('id-ID')}</p>
                            </div>
                            <button 
                                onClick={() => onSave(data)}
                                className="py-2.5 px-6 rounded-md font-bold text-primary-foreground bg-primary hover:opacity-90 transition transform active:scale-95 flex items-center gap-2 shadow-sm"
                            >
                                <Icon name="Save" size={18} /> Simpan
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const ScannerView = ({ onSave, categories }) => {
            const [imageSrc, setImageSrc] = useState(null);
            const [isProcessing, setIsProcessing] = useState(false);
            const [scanResult, setScanResult] = useState(null);
            const [error, setError] = useState(null);
            const fileInputRef = useRef(null);
            const cameraInputRef = useRef(null);

            const handleFileChange = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                if (file.type === 'application/pdf') {
                    alert("Untuk simulasi ini, harap unggah file gambar (JPG/PNG). Dukungan PDF asli memerlukan konversi backend.");
                    return;
                }

                const reader = new FileReader();
                reader.onload = (event) => {
                    setImageSrc(event.target.result);
                    setScanResult(null);
                    setError(null);
                };
                reader.readAsDataURL(file);
            };

            const processImage = async () => {
                if (!imageSrc) return;
                setIsProcessing(true);
                setError(null);

                try {
                    const base64Data = imageSrc.split(',')[1];
                    const mimeType = imageSrc.split(';')[0].split(':')[1];
                    const apiKey = ""; // API Key disuntikkan oleh lingkungan

                    const prompt = `Anda adalah AI pembaca struk kasir untuk perusahaan F&B "Foodstocks".
Tugas Anda adalah membaca gambar struk ini dan mengekstrak data menjadi format JSON murni tanpa markdown blocks.
Format JSON yang diharapkan:
{
  "storeName": "Nama Toko / Restoran",
  "date": "YYYY-MM-DD (format standar)",
  "items": [
    { "name": "Nama Barang", "qty": 1, "price": 10000, "total": 10000, "category": "Bahan Baku" }
  ],
  "subtotal": 10000,
  "total": 10000,
  "paymentMethod": "Metode Pembayaran (Cash/BCA/dll)"
}
Catatan Kategori: Pilih salah satu dari [Bahan Baku, Operasional, Marketing, ATK, Lainnya] berdasarkan nama barang.
Pastikan total dan angka menggunakan tipe data number.`;

                    const payload = {
                        contents: [{
                            role: "user",
                            parts: [
                                { text: prompt },
                                { inlineData: { mimeType: mimeType, data: base64Data } }
                            ]
                        }],
                        generationConfig: {
                            responseMimeType: "application/json",
                            temperature: 0.1
                        }
                    };

                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (!response.ok) throw new Error("Gagal menghubungi AI. Coba lagi.");

                    const data = await response.json();
                    const jsonText = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    
                    if (!jsonText) throw new Error("Data tidak valid dari AI.");
                    
                    const parsedData = JSON.parse(jsonText);
                    setScanResult(parsedData);

                } catch (err) {
                    console.error(err);
                    setError("Gagal membaca struk. AI mungkin sibuk atau gambar kurang jelas.");
                    
                    setTimeout(() => {
                        setScanResult({
                            storeName: "Toko Kelontong Sukses (Mock)",
                            date: new Date().toISOString().split('T')[0],
                            items: [
                                { name: "Beras Putih 5kg", qty: 2, price: 65000, total: 130000, category: "Bahan Baku" },
                                { name: "Minyak Goreng 2L", qty: 1, price: 35000, total: 35000, category: "Bahan Baku" },
                                { name: "Kresek Hitam", qty: 5, price: 2000, total: 10000, category: "Operasional" }
                            ],
                            subtotal: 175000,
                            total: 175000,
                            paymentMethod: "Cash"
                        });
                        setIsProcessing(false);
                        setError("Menggunakan data simulasi karena koneksi API gagal.");
                    }, 1500);
                    return;
                } finally {
                    setIsProcessing(false);
                }
            };

            return (
                <div className="space-y-6 animate-fade-in pb-10">
                    <div>
                        <h2 className="text-2xl font-bold text-foreground">Scan Struk Belanja</h2>
                        <p className="text-muted-foreground">Unggah foto struk untuk otomatisasi pencatatan menggunakan AI.</p>
                    </div>

                    {!imageSrc ? (
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div 
                                onClick={() => fileInputRef.current?.click()}
                                className="border-2 border-dashed border-primary/40 bg-primary/5 hover:bg-primary/10 rounded-2xl p-10 flex flex-col items-center justify-center text-center cursor-pointer transition-colors group h-64"
                            >
                                <div className="w-16 h-16 rounded-full bg-background shadow-sm flex items-center justify-center text-primary mb-4 group-hover:scale-110 transition-transform">
                                    <Icon name="UploadCloud" size={32} />
                                </div>
                                <h3 className="font-semibold text-foreground mb-1">Unggah File (Max 10)</h3>
                                <p className="text-sm text-muted-foreground">Klik atau seret file JPG, PNG, PDF</p>
                                <input type="file" ref={fileInputRef} onChange={handleFileChange} accept="image/*,application/pdf" className="hidden" multiple />
                            </div>

                            <div 
                                onClick={() => cameraInputRef.current?.click()}
                                className="border-2 border-dashed border-secondary/40 bg-secondary/5 hover:bg-secondary/10 rounded-2xl p-10 flex flex-col items-center justify-center text-center cursor-pointer transition-colors group h-64"
                            >
                                <div className="w-16 h-16 rounded-full bg-background shadow-sm flex items-center justify-center text-secondary-foreground mb-4 group-hover:scale-110 transition-transform">
                                    <Icon name="Camera" size={32} />
                                </div>
                                <h3 className="font-semibold text-foreground mb-1">Ambil Foto</h3>
                                <p className="text-sm text-muted-foreground">Gunakan kamera HP Anda</p>
                                <input type="file" ref={cameraInputRef} onChange={handleFileChange} accept="image/*" capture="environment" className="hidden" />
                            </div>
                        </div>
                    ) : (
                        <div className="flex flex-col md:flex-row gap-6">
                            <div className="w-full md:w-1/3 space-y-4">
                                <div className="bg-muted rounded-xl overflow-hidden shadow-inner relative aspect-[3/4]">
                                    <img src={imageSrc} alt="Preview" className="w-full h-full object-cover" />
                                    {isProcessing && (
                                        <div className="absolute inset-0 bg-background/60 backdrop-blur-sm flex flex-col items-center justify-center text-foreground">
                                            <Icon name="Loader2" className="animate-spin mb-4" size={40} />
                                            <p className="font-medium animate-pulse">AI sedang membaca data...</p>
                                        </div>
                                    )}
                                </div>
                                <div className="flex gap-2">
                                    <button 
                                        onClick={() => { setImageSrc(null); setScanResult(null); setError(null); }}
                                        className="flex-1 py-3 px-4 rounded-md font-medium text-foreground bg-muted hover:opacity-80 transition"
                                        disabled={isProcessing}
                                    >
                                        Batal
                                    </button>
                                    {!scanResult && (
                                        <button 
                                            onClick={processImage}
                                            className="flex-1 py-3 px-4 rounded-md font-medium text-primary-foreground bg-primary hover:opacity-90 shadow-sm transition disabled:opacity-50 flex items-center justify-center gap-2"
                                            disabled={isProcessing}
                                        >
                                            <Icon name="Sparkles" size={18} />
                                            Ekstrak Data
                                        </button>
                                    )}
                                </div>
                                {error && (
                                    <div className="p-3 bg-destructive/10 text-destructive rounded-md text-sm border border-destructive/20 flex items-start gap-2">
                                        <Icon name="AlertCircle" size={16} className="mt-0.5 flex-shrink-0" />
                                        <span>{error}</span>
                                    </div>
                                )}
                            </div>

                            <div className="w-full md:w-2/3">
                                {scanResult ? (
                                    <ResultEditor 
                                        initialData={scanResult} 
                                        categories={categories}
                                        onSave={(data) => {
                                            const newTx = {
                                                id: Date.now(),
                                                date: data.date,
                                                store: data.storeName,
                                                total: data.total,
                                                category: data.items.length > 0 ? data.items[0].category : 'Lainnya',
                                                status: 'Pending',
                                                items: data.items,
                                                imageSrc: imageSrc
                                            };
                                            onSave(newTx);
                                        }} 
                                    />
                                ) : (
                                    <div className="h-full border-2 border-dashed border-border rounded-xl flex flex-col items-center justify-center text-muted-foreground min-h-[300px]">
                                        <Icon name="TableProperties" size={48} className="mb-4 opacity-50" />
                                        <p>Hasil ekstraksi akan muncul di sini</p>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const HistoryView = ({ transactions, onDelete, categories }) => {
            const [searchTerm, setSearchTerm] = useState('');
            const [filterCategory, setFilterCategory] = useState('All');
            const [viewImage, setViewImage] = useState(null);

            const filteredTxs = transactions.filter(tx => {
                const matchSearch = tx.store.toLowerCase().includes(searchTerm.toLowerCase());
                const matchCategory = filterCategory === 'All' || tx.category === filterCategory;
                return matchSearch && matchCategory;
            });

            const exportCSV = () => {
                let csvContent = "data:text/csv;charset=utf-8,";
                csvContent += "Tanggal,Toko/Supplier,Kategori,Nominal,Status\n";
                
                filteredTxs.forEach(tx => {
                    const row = [
                        tx.date,
                        `"${tx.store}"`,
                        `"${tx.category}"`,
                        tx.total,
                        `"${tx.status}"`
                    ].join(",");
                    csvContent += row + "\r\n";
                });

                const encodedUri = encodeURI(csvContent);
                const link = document.createElement("a");
                link.setAttribute("href", encodedUri);
                link.setAttribute("download", `Riwayat_Foodstocks_${new Date().toISOString().split('T')[0]}.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            const exportPDF = () => {
                if (!window.jspdf) {
                    alert("Sistem PDF sedang dimuat, mohon tunggu beberapa detik lalu coba lagi.");
                    return;
                }
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                
                doc.text("Laporan Riwayat Transaksi Foodstocks", 14, 15);
                doc.setFontSize(10);
                doc.text(`Dicetak pada: ${new Date().toLocaleDateString('id-ID')}`, 14, 22);

                const tableColumn = ["Tanggal", "Toko/Supplier", "Kategori", "Total (Rp)", "Status"];
                const tableRows = [];

                filteredTxs.forEach(tx => {
                    const txData = [
                        tx.date,
                        tx.store,
                        tx.category,
                        tx.total.toLocaleString('id-ID'),
                        tx.status
                    ];
                    tableRows.push(txData);
                });

                doc.autoTable({
                    head: [tableColumn],
                    body: tableRows,
                    startY: 28,
                    theme: 'striped',
                    headStyles: { fillColor: [236, 72, 153] }
                });

                doc.save(`Riwayat_Foodstocks_${new Date().toISOString().split('T')[0]}.pdf`);
            };

            return (
                <div className="space-y-6 animate-fade-in pb-10">
                    <div>
                        <h2 className="text-2xl font-bold text-foreground">Riwayat Transaksi</h2>
                        <p className="text-muted-foreground">Kelola dan filter data pengeluaran yang telah dicatat.</p>
                    </div>

                    <div className="flex flex-col md:flex-row gap-4 mb-6">
                        <div className="relative flex-1">
                            <Icon name="Search" size={18} className="absolute left-3 top-1/2 transform -translate-y-1/2 text-muted-foreground" />
                            <input 
                                type="text" 
                                placeholder="Cari nama toko..." 
                                value={searchTerm}
                                onChange={e => setSearchTerm(e.target.value)}
                                className="w-full pl-10 pr-4 py-2 bg-background border border-input rounded-md focus:ring-2 focus:ring-ring outline-none transition text-sm text-foreground"
                            />
                        </div>
                        <select 
                            value={filterCategory}
                            onChange={e => setFilterCategory(e.target.value)}
                            className="px-4 py-2 bg-background border border-input rounded-md outline-none text-sm focus:ring-2 focus:ring-ring text-foreground shadow-sm"
                        >
                            <option value="All">Semua Kategori</option>
                            {categories.map(cat => (
                                <option key={cat} value={cat}>{cat}</option>
                            ))}
                        </select>
                        <div className="flex gap-2">
                            <button onClick={exportCSV} className="flex items-center justify-center gap-1 bg-secondary text-secondary-foreground px-3 py-2 rounded-md text-sm font-medium hover:opacity-80 transition shadow-sm">
                                <Icon name="FileSpreadsheet" size={16} /> <span className="hidden sm:inline">CSV/Excel</span>
                            </button>
                            <button onClick={exportPDF} className="flex items-center justify-center gap-1 bg-destructive/10 text-destructive border border-destructive/20 px-3 py-2 rounded-md text-sm font-medium hover:bg-destructive/20 transition shadow-sm">
                                <Icon name="FileText" size={16} /> <span className="hidden sm:inline">PDF</span>
                            </button>
                        </div>
                    </div>

                    <div className="bg-card rounded-xl shadow-sm border border-border overflow-hidden">
                        <div className="overflow-x-auto">
                            <table className="w-full text-left border-collapse">
                                <thead>
                                    <tr className="bg-muted/50 text-muted-foreground text-sm uppercase tracking-wider">
                                        <th className="p-4 font-medium">Tanggal</th>
                                        <th className="p-4 font-medium">Detail</th>
                                        <th className="p-4 font-medium">Kategori</th>
                                        <th className="p-4 font-medium text-right">Nominal</th>
                                        <th className="p-4 font-medium text-center">Aksi</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-border">
                                    {filteredTxs.length > 0 ? filteredTxs.map(tx => (
                                        <tr key={tx.id} className="hover:bg-muted/50 transition-colors">
                                            <td className="p-4 text-sm text-muted-foreground">{tx.date}</td>
                                            <td className="p-4">
                                                <p className="font-semibold text-foreground">{tx.store}</p>
                                                <p className="text-xs text-muted-foreground mt-0.5">{tx.status}</p>
                                            </td>
                                            <td className="p-4">
                                                <span className="px-2 py-1 text-xs rounded-full font-medium bg-secondary text-secondary-foreground">
                                                    {tx.category}
                                                </span>
                                            </td>
                                            <td className="p-4 text-sm font-bold text-right text-foreground">
                                                Rp {tx.total.toLocaleString('id-ID')}
                                            </td>
                                            <td className="p-4 text-center">
                                                <div className="flex items-center justify-center space-x-2">
                                                    <button onClick={() => setViewImage(tx.imageSrc || 'not_found')} className="p-2 text-muted-foreground hover:text-primary transition">
                                                        <Icon name="Eye" size={16} />
                                                    </button>
                                                    <button onClick={() => onDelete(tx.id)} className="p-2 text-muted-foreground hover:text-destructive transition">
                                                        <Icon name="Trash2" size={16} />
                                                    </button>
                                                </div>
                                            </td>
                                        </tr>
                                    )) : (
                                        <tr>
                                            <td colSpan="5" className="p-8 text-center text-muted-foreground">
                                                Tidak ada data transaksi ditemukan.
                                            </td>
                                        </tr>
                                    )}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    {/* Modal Viewer Gambar Struk */}
                    {viewImage && (
                        <div className="fixed inset-0 z-[60] flex items-center justify-center p-4 bg-background/80 backdrop-blur-sm" onClick={() => setViewImage(null)}>
                            <div className="bg-card p-4 rounded-xl max-w-md w-full max-h-[90vh] flex flex-col shadow-2xl border border-border" onClick={e => e.stopPropagation()}>
                                <div className="flex justify-between items-center mb-4">
                                    <h3 className="font-bold text-lg text-card-foreground">Foto Struk</h3>
                                    <button onClick={() => setViewImage(null)} className="text-muted-foreground hover:text-foreground transition">
                                        <Icon name="X" size={24} />
                                    </button>
                                </div>
                                <div className="flex-1 overflow-auto bg-muted/50 rounded-lg flex items-center justify-center min-h-[300px] p-2 border border-border">
                                    {viewImage === 'not_found' ? (
                                        <div className="text-center text-muted-foreground flex flex-col items-center gap-2">
                                            <Icon name="ImageOff" size={32} className="opacity-50" />
                                            <p>Foto struk tidak tersedia (data simulasi awal).</p>
                                        </div>
                                    ) : (
                                        <img src={viewImage} alt="Struk" className="max-w-full h-auto object-contain rounded-md shadow-sm" />
                                    )}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const ReportView = ({ transactions, categories }) => {
            const [filterMonth, setFilterMonth] = useState('All');
            const [aiInsight, setAiInsight] = useState(null);
            const [isAnalyzing, setIsAnalyzing] = useState(false);

            // Filter transaksi berdasarkan bulan
            const filteredTxs = transactions.filter(tx => {
                if (filterMonth === 'All') return true;
                const txMonth = tx.date.substring(0, 7); // Format: YYYY-MM
                return txMonth === filterMonth;
            });

            // Hitung total per kategori
            const categoryTotals = categories.reduce((acc, cat) => {
                acc[cat] = 0;
                return acc;
            }, {});

            filteredTxs.forEach(tx => {
                if (categoryTotals[tx.category] !== undefined) {
                    categoryTotals[tx.category] += tx.total;
                } else {
                    categoryTotals['Lainnya'] = (categoryTotals['Lainnya'] || 0) + tx.total;
                }
            });

            const chartData = Object.keys(categoryTotals).map(cat => ({
                name: cat,
                total: categoryTotals[cat]
            }));

            const maxTotal = Math.max(...chartData.map(d => d.total), 1);
            const totalPengeluaran = filteredTxs.reduce((sum, tx) => sum + tx.total, 0);

            // Dapatkan daftar bulan yang tersedia untuk filter
            const availableMonths = [...new Set(transactions.map(tx => tx.date.substring(0, 7)))].sort().reverse();

            const generateAIInsights = async () => {
                if (filteredTxs.length === 0) return alert("Belum ada data transaksi untuk dianalisis.");
                
                setIsAnalyzing(true);
                setAiInsight(null);
                
                try {
                    const apiKey = ""; // API Key disuntikkan oleh lingkungan
                    const prompt = `Anda adalah AI Financial Advisor senior untuk bisnis F&B bernama "Foodstocks".
Berikut adalah ringkasan data pengeluaran operasional (dalam IDR) pada bulan terpilih:
${JSON.stringify(filteredTxs.map(t => ({tanggal: t.date, toko: t.store, kategori: t.category, total: t.total})))}

Tugas Anda:
1. Berikan 1 paragraf analisis singkat tentang pola atau tren pengeluaran terbesar dari data tersebut.
2. Berikan 2-3 poin rekomendasi cerdas dan praktis untuk efisiensi/penghematan biaya ke depannya.
Gunakan gaya bahasa Indonesia yang profesional, ringkas, memotivasi, dan mudah dipahami. Gunakan beberapa emoji yang relevan pada poin-poin Anda. Jangan gunakan sintaks markdown yang rumit.`;

                    const payload = {
                        contents: [{ parts: [{ text: prompt }] }],
                        generationConfig: { temperature: 0.7 }
                    };

                    let response;
                    let retries = 5;
                    const delays = [1000, 2000, 4000, 8000, 16000];
                    
                    for (let i = 0; i <= retries; i++) {
                        response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });
                        if (response.ok) break;
                        if (i < retries) await new Promise(res => setTimeout(res, delays[i]));
                    }

                    if (!response || !response.ok) throw new Error("Gagal menghubungi AI.");
                    
                    const data = await response.json();
                    setAiInsight(data.candidates[0].content.parts[0].text);
                } catch (err) {
                    console.error("AI Error:", err);
                    setAiInsight("Maaf, AI saat ini sedang sibuk atau koneksi terputus. Silakan coba lagi nanti.");
                } finally {
                    setIsAnalyzing(false);
                }
            };

            return (
                <div className="space-y-6 animate-fade-in pb-10">
                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                        <div>
                            <h2 className="text-2xl font-bold text-foreground">Laporan Pengeluaran</h2>
                            <p className="text-muted-foreground">Ringkasan visual pengeluaran berdasarkan kategori.</p>
                        </div>
                        <div className="flex items-center gap-3 w-full md:w-auto">
                            <button 
                                onClick={generateAIInsights}
                                disabled={isAnalyzing}
                                className="flex-1 md:flex-none flex items-center justify-center gap-2 bg-primary text-primary-foreground px-4 py-2 rounded-md text-sm font-medium shadow-sm transition hover:opacity-90 disabled:opacity-50"
                            >
                                <Icon name="Sparkles" size={16} className={isAnalyzing ? "animate-pulse" : ""} /> 
                                <span>{isAnalyzing ? "Menganalisis..." : "✨ Analisis AI"}</span>
                            </button>
                            <select 
                                value={filterMonth}
                                onChange={e => setFilterMonth(e.target.value)}
                                className="flex-1 md:flex-none px-4 py-2 bg-background border border-input rounded-md outline-none text-sm focus:ring-2 focus:ring-ring text-foreground shadow-sm"
                            >
                                <option value="All">Semua Waktu</option>
                                {availableMonths.map(m => (
                                    <option key={m} value={m}>{m}</option>
                                ))}
                            </select>
                        </div>
                    </div>

                    <div className="bg-card rounded-xl p-6 shadow-sm border border-border">
                        <div className="mb-8">
                            <h3 className="font-bold text-card-foreground mb-1">Total Pengeluaran</h3>
                            <p className="text-3xl font-black text-primary">Rp {totalPengeluaran.toLocaleString('id-ID')}</p>
                        </div>

                        {totalPengeluaran === 0 ? (
                            <div className="h-64 flex flex-col items-center justify-center text-muted-foreground">
                                <Icon name="BarChart3" size={48} className="mb-4 opacity-30" />
                                <p>Belum ada data transaksi.</p>
                            </div>
                        ) : (
                            <div className="flex items-end h-72 gap-2 sm:gap-4 mt-8 pt-6 border-b border-border pb-2 relative">
                                {chartData.map((data) => (
                                    <div key={data.name} className="flex flex-col items-center flex-1 group h-full justify-end relative">
                                        <div className="w-full relative flex justify-center items-end bg-muted/30 rounded-t-lg" style={{ height: '100%' }}>
                                            <div
                                                className="w-full max-w-[60px] bg-primary rounded-t-md transition-all duration-700 ease-out group-hover:opacity-80 relative shadow-sm"
                                                style={{ height: `${(data.total / maxTotal) * 100}%`, minHeight: data.total > 0 ? '4px' : '0' }}
                                            >
                                                {/* Tooltip Hover Graphic */}
                                                <div className="absolute bottom-full left-1/2 transform -translate-x-1/2 mb-2 opacity-0 group-hover:opacity-100 transition-opacity bg-popover text-popover-foreground border border-border text-xs py-1.5 px-3 rounded-lg whitespace-nowrap z-10 shadow-lg pointer-events-none">
                                                    <p className="font-bold">{data.name}</p>
                                                    <p>Rp {data.total.toLocaleString('id-ID')}</p>
                                                    <div className="absolute top-full left-1/2 transform -translate-x-1/2 border-4 border-transparent border-t-border"></div>
                                                </div>
                                            </div>
                                        </div>
                                        <span className="text-[10px] sm:text-xs font-semibold text-muted-foreground mt-3 truncate w-full text-center" title={data.name}>
                                            {data.name}
                                        </span>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>

                    {/* AI Insight Card */}
                    {(isAnalyzing || aiInsight) && (
                        <div className="bg-primary/5 rounded-xl p-6 shadow-sm border border-primary/20 relative overflow-hidden mt-6">
                            <div className="absolute top-0 right-0 -mt-4 -mr-4 text-primary opacity-5">
                                <Icon name="Sparkles" size={120} />
                            </div>
                            <div className="relative z-10">
                                <div className="flex items-center gap-2 mb-4 text-primary">
                                    <Icon name="Sparkles" size={20} />
                                    <h3 className="font-bold text-lg">AI Financial Advisor</h3>
                                </div>
                                
                                {isAnalyzing ? (
                                    <div className="space-y-3 animate-pulse">
                                        <div className="h-4 bg-muted rounded w-3/4"></div>
                                        <div className="h-4 bg-muted rounded w-full"></div>
                                        <div className="h-4 bg-muted rounded w-5/6"></div>
                                        <div className="h-4 bg-muted rounded w-2/3 mt-4"></div>
                                        <div className="h-4 bg-muted rounded w-4/5"></div>
                                    </div>
                                ) : (
                                    <div className="text-foreground text-sm leading-relaxed whitespace-pre-line">
                                        {aiInsight}
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const SettingsView = ({ categories, setCategories, webhookUrl, setWebhookUrl }) => {
            const [editingIdx, setEditingIdx] = useState(null);
            const [editValue, setEditValue] = useState('');

            const scriptCode = `function doPost(e) {
  try {
    var sheet = SpreadsheetApp.getActiveSpreadsheet().getActiveSheet();
    
    // Otomatis buat header jika sheet masih kosong
    if (sheet.getLastRow() === 0) {
      sheet.appendRow(["Waktu Input", "Tanggal Transaksi", "Toko/Supplier", "Kategori", "Detail Barang", "Total (Rp)"]);
      sheet.getRange("A1:F1").setFontWeight("bold");
    }
    
    var data = JSON.parse(e.postData.contents);
    sheet.appendRow([new Date(), data.date, data.store, data.category, data.items, data.total]);
    
    return ContentService.createTextOutput("Success").setMimeType(ContentService.MimeType.TEXT);
  } catch(error) {
    return ContentService.createTextOutput("Error: " + error.toString()).setMimeType(ContentService.MimeType.TEXT);
  }
}`;

            const copyScript = () => {
                const textArea = document.createElement("textarea");
                textArea.value = scriptCode;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand("copy");
                document.body.removeChild(textArea);
                alert("Kode Apps Script berhasil disalin!");
            };

            const startEdit = (idx, val) => {
                setEditingIdx(idx);
                setEditValue(val);
            };

            const saveEdit = (idx) => {
                const newCats = [...categories];
                if (editValue.trim() !== '') {
                    newCats[idx] = editValue.trim();
                }
                setCategories(newCats);
                setEditingIdx(null);
            };

            const addCategory = () => {
                setCategories([...categories, 'Kategori Baru']);
                setEditingIdx(categories.length);
                setEditValue('Kategori Baru');
            };

            const deleteCategory = (idx) => {
                setCategories(categories.filter((_, i) => i !== idx));
            };

            return (
                <div className="space-y-6 animate-fade-in max-w-2xl pb-10">
                    <div>
                        <h2 className="text-2xl font-bold text-foreground">Pengaturan Integrasi</h2>
                        <p className="text-muted-foreground">Hubungkan aplikasi ke Google Sheets menggunakan Google Apps Script Webhook.</p>
                    </div>

                    <div className="bg-card rounded-xl shadow-sm border border-border p-6">
                        <div className="flex items-center gap-4 mb-6 pb-6 border-b border-border">
                            <div className="w-12 h-12 bg-primary/10 rounded-xl flex items-center justify-center text-primary">
                                <Icon name="FileSpreadsheet" size={24} />
                            </div>
                            <div className="flex-1">
                                <h3 className="font-bold text-card-foreground">Google Sheets Auto-Sync</h3>
                                <p className="text-sm text-muted-foreground">Otomatis POST data ke spreadsheet Anda saat struk disimpan.</p>
                            </div>
                            <span className={`px-3 py-1 text-xs font-bold rounded-full border ${webhookUrl && webhookUrl.includes('script.google.com') ? 'bg-green-100 text-green-700 border-green-200 dark:bg-green-900/40 dark:text-green-400 dark:border-green-800' : 'bg-yellow-100 text-yellow-700 border-yellow-200 dark:bg-yellow-900/40 dark:text-yellow-400 dark:border-yellow-800'}`}>
                                {webhookUrl && webhookUrl.includes('script.google.com') ? 'Aktif' : 'Belum Valid'}
                            </span>
                        </div>

                        <div className="space-y-4">
                            <div>
                                <label className="block text-sm font-medium text-foreground mb-1">URL Webhook (Google Apps Script)</label>
                                <input 
                                    type="text" 
                                    value={webhookUrl}
                                    onChange={(e) => setWebhookUrl(e.target.value)}
                                    placeholder="https://script.google.com/macros/s/.../exec" 
                                    className={`w-full px-3 py-2 bg-background border ${webhookUrl && !webhookUrl.includes('script.google.com') ? 'border-destructive ring-1 ring-destructive' : 'border-input focus:ring-ring'} rounded-md text-foreground text-sm focus:ring-2 outline-none transition`} 
                                />
                                {webhookUrl && !webhookUrl.includes('script.google.com') && (
                                    <p className="text-xs text-destructive mt-1.5 font-semibold">⚠️ URL Salah! Jangan masukkan link Google Sheets biasa. Anda harus membuat Web App di Apps Script terlebih dahulu.</p>
                                )}
                                <div className="text-xs text-muted-foreground mt-3 flex flex-col gap-2 bg-muted/50 p-4 rounded-lg border border-border">
                                    <span className="font-bold text-foreground text-sm">Cara Integrasi (dengan Header Otomatis):</span>
                                    <ol className="list-decimal pl-4 space-y-1">
                                        <li>Buka File Spreadsheet kosong Anda {'>'} klik menu <b>Extensions</b> {'>'} <b>Apps Script</b>.</li>
                                        <li>Hapus kode bawaan, lalu <i>paste</i> kode di bawah ini:
                                            <div className="relative mt-2 mb-2">
                                                <pre className="bg-zinc-900 text-green-400 p-3 rounded-md overflow-x-auto text-[10px] leading-tight font-mono">
                                                    <code>{scriptCode}</code>
                                                </pre>
                                                <button onClick={copyScript} className="absolute top-2 right-2 bg-zinc-700 hover:bg-zinc-600 text-white px-2 py-1 rounded shadow text-[10px] transition">Salin Kode</button>
                                            </div>
                                        </li>
                                        <li>Klik <b>Deploy</b> (kanan atas) {'>'} <b>New Deployment</b>.</li>
                                        <li>Pilih tipe <b>Web App</b>. Akses (Who has access) atur ke <b>"Anyone"</b> {'>'} klik Deploy.</li>
                                        <li className="text-primary font-semibold mt-1">💡 Tips jika muncul peringatan "Google hasn't verified this app":
                                            <ul className="list-disc pl-4 mt-1 font-normal text-muted-foreground">
                                                <li>Klik teks <b>"Advanced"</b> (Lanjutan) di kiri bawah kotak.</li>
                                                <li>Klik teks <b>"Go to [Nama Project Anda] (unsafe)"</b>.</li>
                                                <li>Klik <b>"Allow"</b>. Ini aman karena Anda yang membuat script tersebut.</li>
                                            </ul>
                                        </li>
                                        <li className="mt-1">Salin URL Web App yang berakhiran <b>/exec</b> dan tempel di kotak URL di atas.</li>
                                    </ol>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div className="bg-card rounded-xl shadow-sm border border-border p-6">
                        <div className="flex justify-between items-center mb-4">
                            <h3 className="font-bold text-card-foreground">Pengaturan Kategori Auto-Grouping</h3>
                            <button onClick={addCategory} className="text-sm font-medium text-primary hover:opacity-80 flex items-center gap-1">
                                <Icon name="PlusCircle" size={16} /> Tambah
                            </button>
                        </div>
                        <div className="space-y-2">
                            {categories.map((cat, idx) => (
                                <div key={idx} className="flex justify-between items-center p-3 bg-muted/50 rounded-lg border border-transparent hover:border-border group transition-colors">
                                    {editingIdx === idx ? (
                                        <input 
                                            type="text" 
                                            value={editValue} 
                                            onChange={(e) => setEditValue(e.target.value)}
                                            onBlur={() => saveEdit(idx)}
                                            onKeyDown={(e) => e.key === 'Enter' && saveEdit(idx)}
                                            autoFocus
                                            className="flex-1 bg-background border border-primary rounded px-2 py-1 text-sm outline-none text-foreground mr-2"
                                        />
                                    ) : (
                                        <span className="font-medium text-foreground">{cat}</span>
                                    )}
                                    <div className="flex gap-3 items-center opacity-100 md:opacity-0 md:group-hover:opacity-100 transition-opacity">
                                        {editingIdx === idx ? (
                                            <button onClick={() => saveEdit(idx)} className="text-green-500 hover:text-green-600 transition">
                                                <Icon name="Check" size={16} />
                                            </button>
                                        ) : (
                                            <button onClick={() => startEdit(idx, cat)} className="text-muted-foreground hover:text-primary transition">
                                                <Icon name="Edit2" size={16} />
                                            </button>
                                        )}
                                        <button onClick={() => deleteCategory(idx)} className="text-muted-foreground hover:text-destructive transition">
                                            <Icon name="Trash2" size={16} />
                                        </button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        // --- Main App Component ---
        const App = () => {
            const [darkMode, setDarkMode] = useState(false);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
            const [isSyncing, setIsSyncing] = useState(false);

            // Gunakan LocalStorage agar data tidak hilang saat direfresh
            const [transactions, setTransactions] = useState(() => {
                const saved = localStorage.getItem('fs_txs');
                return saved ? JSON.parse(saved) : initialTransactions;
            });
            const [categories, setCategories] = useState(() => {
                const saved = localStorage.getItem('fs_cats');
                return saved ? JSON.parse(saved) : ['Bahan Baku', 'Operasional', 'Marketing', 'ATK', 'Lainnya'];
            });
            const [webhookUrl, setWebhookUrl] = useState(() => localStorage.getItem('fs_webhook') || '');

            useEffect(() => { localStorage.setItem('fs_txs', JSON.stringify(transactions)); }, [transactions]);
            useEffect(() => { localStorage.setItem('fs_cats', JSON.stringify(categories)); }, [categories]);
            useEffect(() => { localStorage.setItem('fs_webhook', webhookUrl); }, [webhookUrl]);

            // Toggle Dark Mode
            useEffect(() => {
                if (darkMode) {
                    document.documentElement.classList.add('dark');
                } else {
                    document.documentElement.classList.remove('dark');
                }
            }, [darkMode]);

            // Manual Sync Trigger from Dashboard
            const handleManualSync = async () => {
                if (!webhookUrl || webhookUrl.trim() === '') {
                    alert("Silakan atur URL Webhook Google Apps Script di menu Pengaturan terlebih dahulu.");
                    return;
                }
                
                if (!webhookUrl.includes("script.google.com/macros/s/") || !webhookUrl.endsWith("/exec")) {
                    alert("ERROR: URL tidak valid!\n\nPastikan Anda memasukkan URL dari 'Google Apps Script' yang berakhiran '/exec', BUKAN link Google Sheets biasa.");
                    return;
                }
                
                const pendingTxs = transactions.filter(tx => tx.status === 'Pending');
                if (pendingTxs.length === 0) {
                    alert("Semua transaksi sudah tersinkronisasi dengan Google Sheets.");
                    return;
                }

                setIsSyncing(true);
                let successCount = 0;

                for (const tx of pendingTxs) {
                    try {
                        const payload = {
                            date: tx.date,
                            store: tx.store,
                            category: tx.category,
                            total: tx.total,
                            items: tx.items ? tx.items.map(i => `${i.name} (${i.qty})`).join(', ') : '-'
                        };

                        await fetch(webhookUrl, {
                            method: 'POST',
                            mode: 'no-cors',
                            headers: { 'Content-Type': 'text/plain' },
                            body: JSON.stringify(payload)
                        });
                        
                        successCount++;
                        setTransactions(prev => prev.map(t => t.id === tx.id ? { ...t, status: 'Synced' } : t));
                    } catch (error) {
                        console.error('Gagal sync', tx.id, error);
                    }
                }
                setIsSyncing(false);
                if (successCount > 0) alert(`Berhasil menyinkronkan ${successCount} transaksi ke Spreadsheet.`);
            };

            // Save Transaction & Auto Sync to Google Sheets
            const handleSaveTransaction = async (newTx) => {
                setTransactions(prev => [newTx, ...prev]);
                setActiveTab('history');

                if (webhookUrl && webhookUrl.trim() !== '') {
                    if (!webhookUrl.includes("script.google.com/macros/s/") || !webhookUrl.endsWith("/exec")) {
                        alert("Gagal Sinkronisasi Otomatis: URL Webhook di pengaturan tidak valid. Harap gunakan link Google Apps Script.");
                        return;
                    }

                    try {
                        const payload = {
                            date: newTx.date,
                            store: newTx.store,
                            category: newTx.category,
                            total: newTx.total,
                            items: newTx.items ? newTx.items.map(i => `${i.name} (${i.qty})`).join(', ') : '-'
                        };

                        await fetch(webhookUrl, {
                            method: 'POST',
                            mode: 'no-cors',
                            headers: { 'Content-Type': 'text/plain' },
                            body: JSON.stringify(payload)
                        });

                        setTransactions(prev => prev.map(tx => tx.id === newTx.id ? { ...tx, status: 'Synced' } : tx));
                    } catch (error) {
                        console.error('Gagal integrasi otomatis ke Google Sheets', error);
                    }
                }
            };

            const handleDeleteTransaction = (id) => {
                setTransactions(transactions.filter(tx => tx.id !== id));
            };

            return (
                <div className="flex h-screen overflow-hidden">
                    {/* Sidebar (Desktop) */}
                    <aside className="hidden md:flex flex-col w-64 bg-card border-r border-border z-10">
                        <div className="p-6 flex items-center space-x-3">
